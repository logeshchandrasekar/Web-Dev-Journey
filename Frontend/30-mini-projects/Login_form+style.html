<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login form</title>
<style>
      .login-wrap {
    display: flex; align-items: center; justify-content: center;
  }
  .login-box {
    background: #fff; border-radius: 16px; padding: 40px 36px;
    box-shadow: 0 8px 32px rgba(0,0,0,.12); width: 340px;
  }
  .login-box h3 { font-size: 22px; margin-bottom: 4px; }
  .login-box .sub { color: #888; font-size: 20px; margin-bottom: 24px; }
  .login-box label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; }
  .login-box input[type="text"],
  .login-box input[type="email"],
  .login-box input[type="password"] {
    width: 100%; padding: 10px 14px; border: 1.5px solid #e0e0e0;
    border-radius: 8px; font-size: 14px; margin-bottom: 16px;
    outline: none; transition: border-color .2s;
  }
  .login-box input:focus { border-color: #4f8ef7; }
  .login-box .login-btn {
    width: 100%; padding: 12px; background: #4f8ef7; color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  .login-box .login-btn:hover { background: #2b6fe0; }
  .login-box .footer-link { text-align: center; margin-top: 16px; font-size: 13px; color: #888; }
  .login-box .footer-link a { color: #4f8ef7; text-decoration: none; }
</style>
</head>
<body>
<section class="section" id="tab-5">
  <h1>Login Form UI</h1>
  <div class="login-wrap">
    <div class="login-box">
      <h2>Welcome back 👋</h2>
      <p class="sub">Sign in to your account</p>
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com">
      <label for="pwd">Password</label>
      <input type="password" id="pwd" placeholder="••••••••">
      <button class="login-btn">Sign In</button>
      <p class="footer-link">Don't have an account? <a href="#">Sign up</a></p>
    </div>
  </div>
</section>
</body>
</html>
