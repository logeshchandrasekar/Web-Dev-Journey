<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <main>
    <h1>Registration Form</h1>
    <form action="/4.registration_form.html" method="post">
        <fieldset>
            <legend>User Information</legend>
        <div>
            <label for="firstname">First Name:</label><br>
            <input type="text" id="firstname" name="firstname" placeholder="Enter your first name" required><br>
            </div>
            <label for="lastname">Last Name:</label><br>
            <input type="text" id="lastname" name="lastname" placeholder="Enter your last name" required><br>
        </div> <br>
        <div>
             <label for="dob">Date of Birth:</label><br>
             <input type="date" id="dob" name="dob" required><br>
        </div> <br>
        <div>
            <label for="gender">Gender:</label><br>
            <select id="gender" name="gender" required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div> <br>
        </fieldset>
        <fieldset>
            <legend>Contact Information</legend>
            <div>
            <label for="mobile">Mobile Number:</label><br>
            <input type="tel" id="mobile" name="mobile" placeholder="Enter your mobile number" required>
        </div> <br>
            <div id="mail">
            <label for="mail">Email:</label><br>
            <input type="email" id="mail" name="mail" placeholder="Enter your email" required>
        </div> <br>
        <div>
            <label for="address">Address:</label><br>
            <textarea id="address" name="address" placeholder="Enter your address" maxlength="200" required></textarea>
        </div> <br>
        <div>
            <label for="city">City:</label><br>
            <input type="text" id="city" name="city" placeholder="Enter your city" required>
        </div> <br>
        <div>
            <label for="state">State:</label><br>
            <input type="text" id="state" name="state" placeholder="Enter your state" required>
        </div> <br>
        <div>
            <label for="zip">Zip Code:</label><br>
            <input type="text" id="zip" name="zip" placeholder="Enter your zip code" required>
        </div> <br>
        </fieldset>
        <div>
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">I agree to the terms and conditions</label>
        </div> <br>
        <button type="submit">Register</button>
    </form>
    </main>
    <footer>
        <p>&copy; 2026 Registration Form. All rights reserved.</p>
    </footer>
</body>
</html>
