<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Profile Card</title>
        <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #f4f4f4;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.card-background {
    background: #ff4b4b;
    width: 90%;
    max-width: 400px;
    min-height: 500px;

    display: flex;
    flex-direction: column;
    align-items: center;
    border-radius: 20px;
    border: #000000 2px solid;
    padding: 20px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
}
.profile-pic {
    width: 150px;
    height: 150px;
    border:#000000 2px solid;
    margin-bottom: 20px;
    border-radius: 50%;
    transition: transform 0.3s ease;
}
.profile-pic:hover {
    transform: scale(1.1);
}
.profile {
    text-align: center;  
}
.profile h1 {
    margin-bottom: 10px;
}
.profile p {
    margin-bottom: 20px;
}
.bio {
    text-align: center;
    line-height: 1.2;
    margin-top: 20px;
}
.bio p {
    margin-bottom: 10px;
}
.links {
    margin-top: 20px;
    display: flex;
    gap: 20px;
}
a {
    text-decoration: none;
    color: #000000;
}
.links a[href] {
    padding: 10px;
    text-decoration: none;
}
#message {
    background: #000000;
    color: #ffffff;
    padding: 10px 20px;
    border-radius: 5px;
    transition: background-color 0.3s ease;
}
#message:hover {
    background: #ba0000;
}
        </style>
    </head>
    <body>
        <main>
            <div class="card-background">
                <img class="profile-pic" src="https://i.pinimg.com/736x/1b/47/2a/1b472a5e6edaecded0a987b486dab823.jpg" alt="Profile Picture" width="150" height="150" style="border-radius: 50%;">
            <section class="profile">
                <h1>Logeshwar Chandrasekar</h1>
                <p>Full Stack Developer | Tech Enthusiast | Blogger</p>
                <a href="mailto:imlogesh04@gmail.com" id="message">Message</a>
            </section>
            <section class="bio">
                <p>A passionate full stack developer with a love for creating innovative web applications.</p>
                <p>I specialize in JavaScript, React, and Node.js.</p>
            </section>
            <section class="links">
                <a href="https://www.linkedin.com/in/logeshwar-chandrasekar" target="_blank" rel="noopener noreferrer">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/linkedin/linkedin-original.svg" alt="LinkedIn" width="30" height="30">
                </a>
                <a href="https://github.com/logeshchandrasekar" target="_blank" rel="noopener noreferrer">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/github/github-original-wordmark.svg" alt="GitHub" width="30" height="30">
                </a>
                <a href="https://twitter.com/logeshchandrasekar" target="_blank" rel="noopener noreferrer">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/twitter/twitter-original.svg" alt="Twitter" width="30" height="30">
                </a>
            </section>
            </div>
        </main>
    </body>
</html>
