<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .plans {
            display: flex;
            gap: 24px;
        }

        .card {
            background: linear-gradient(135deg, #e8f0fe, #c7d9fb);
            border: 2px solid #5b9bd5;
            box-shadow: 0 4px 16px rgba(91, 155, 213, 0.3);
            width: 220px;
            border-radius: 10px;
            text-align: center;
            padding: 32px 20px 24px;
            display: flex;
            flex-direction: column;
        }

        .card h4 {
            font-size: 14px;
            font-weight: 600;
            color: #2563eb;
            margin-bottom: 10px;
        }

        .card h2 {
            font-size: 26px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 16px;
        }

        .card p {
            font-size: 13px;
            color: #555;
            margin-top: 6px;
        }

        .btn {
            margin-top: auto;
            padding-top: 20px;
        }

        .btn button {
            width: 100%;
            padding: 10px 0;
            background-color: transparent;
            border: 2px solid #2563eb;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #2563eb;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }

        .btn button:hover {
            background-color: #2563eb;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <main>
        <h1>Price cards</h1>
        <section class="plans">

            <div class="card">
                <h3>Basic Plan</h3>
                <h2>$10</h2>
                <p>3 pages</p>
                <p>Set one time limits</p>
                <p>Basic support</p>
                <div class="btn">
                    <button>Get Started ➡️</button>
                </div>
            </div>

            <div class="card">
                <h3>Standard Plan</h3>
                <h2>$20/month</h2>
                <p>10 pages</p>
                <p>Set monthly limits</p>
                <p>Priority support</p>
                <div class="btn">
                    <button>Get Started ➡️</button>
                </div>
            </div>

            <div class="card">
                <h3>Premium Plan</h3>
                <h2>$30/month</h2>
                <p>Unlimited pages</p>
                <p>Set monthly limits</p>
                <p>24/7 support</p>
                <div class="btn">
                    <button>Get Started ➡️</button>
                </div>
            </div>

        </section>
    </main>
</body>
</html>
