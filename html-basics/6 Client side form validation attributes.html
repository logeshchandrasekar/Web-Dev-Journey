form action="submission.html" method="GET">
        <label for="username">Username:</label>
        <br>
	<input id="username" name="username" type="text" required minlength="3" maxlength="15" pattern="[a-zA-Z0-9]+">
	<!-- to set a min and max value for a number field, use min="1" & max="10" on the input and remember to use the + at the end of the pattern declaration -->
        <br>
        <label for="pw">Password:</label>
        <br>
				<input id="pw" name="pw" type="password" required minlength="8" maxlength="15">
        <br>
        <input type="submit" value="Submit">
      </form>
